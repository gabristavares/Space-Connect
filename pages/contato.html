    <main class="pagina contato-page">
    <p class="tag">Formulário funcional</p>
    <h1>Contato</h1>
    <p>Preencha o formulário para simular o contato com a equipe do projeto.</p>

    <form id="formContato" novalidate>
      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Digite seu nome" required>

      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu e-mail" required>

      <label for="assunto">Assunto</label>
      <select id="assunto" required>
        <option value="">Selecione uma opção</option>
        <option>Parceria</option>
        <option>Investimento</option>
        <option>Dúvida sobre o projeto</option>
        <option>Outros</option>
      </select>

      <label for="mensagemTexto">Mensagem</label>
      <textarea id="mensagemTexto" placeholder="Digite sua mensagem" required></textarea>

      <button type="submit">Enviar mensagem</button>
      <p id="mensagem" class="mensagem-contato" aria-live="polite"></p>
    </form>
  </main>

</body>
